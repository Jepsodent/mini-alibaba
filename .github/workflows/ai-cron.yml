name: AI Fraud Analyzer Worker

on:
  schedule:
    - cron: '0 */6 * * *' # Berjalan otomatis setiap 6 jam
  workflow_dispatch:      # Menambahkan tombol agar bisa dijalankan manual saat Demo Hackathon

jobs:
  run-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          cd ai-worker
          pip install -r requirements.txt

      - name: Execute AI Worker
        env:
          # Menyambungkan variabel lingkungan dari GitHub Secrets ke script Python
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_DEFAULT_KEY }}
        run: |
          cd ai-worker
          python worker.py