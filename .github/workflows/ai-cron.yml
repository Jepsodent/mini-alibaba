name: AI Fraud Analyzer Worker

on:
  schedule:
    # Berjalan otomatis setiap 6 jam (Menit 0, Jam 0, 6, 12, 18)
    - cron: '0 */6 * * *'
  # Memungkinkan kita memencet tombol "Run" secara manual kapan saja dari web GitHub!
  workflow_dispatch: 

jobs:
  run-ai-model:
    runs-on: ubuntu-latest
    # Kita masuk ke folder tempat script berada
    defaults:
      run:
        working-directory: ./ai-worker

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run AI Worker Script
        env:
          # Mengambil kunci rahasia dari brankas GitHub Secrets
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          python worker.py