name: AI Fraud Analyzer Worker

on:
  schedule:
    - cron: "0 */6 * * *" # Jalan tiap 6 jam
  workflow_dispatch: # Bisa diklik manual di GitHub

jobs:
  run-ai:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install pandas xgboost supabase joblib scikit-learn python-dotenv

      - name: Execute Worker
        env:
          # Menyambungkan variabel lingkungan dari GitHub Secrets ke script Python
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          cd ai-worker
          python workers.py
